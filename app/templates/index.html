<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Churn Prediction</title>
<style>
    body{
        font-family: Arial;
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }
    .container{
        background:white;
        padding:30px;
        border-radius:10px;
        width:400px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    h2{
        text-align:center;
    }
    input, select{
        width:100%;
        padding:8px;
        margin:6px 0 12px 0;
    }
    button{
        width:100%;
        padding:10px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }
    button:hover{
        background:#0056b3;
    }
</style>
</head>

<body>

<div class="container">
<h2>Bank Churn Prediction</h2>

<form id="churnForm">

<label>Credit Score</label>
<input type="number" name="CreditScore" required>

<label>Geography</label>
<select name="Geography">
<option value="France">France</option>
<option value="Germany">Germany</option>
<option value="Spain">Spain</option>
</select>

<label>Gender</label>
<select name="Gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<label>Age</label>
<input type="number" name="Age" required>

<label>Tenure</label>
<input type="number" name="Tenure">

<label>Balance</label>
<input type="number" step="0.01" name="Balance">

<label>Number Of Products</label>
<input type="number" name="NumOfProducts">

<label>Has Credit Card</label>
<select name="HasCrCard">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Is Active Member</label>
<select name="IsActiveMember">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Estimated Salary</label>
<input type="number" step="0.01" name="EstimatedSalary">

<button type="submit">Predict Churn</button>

</form>

<p id="result"></p>

</div>

<script>
document.getElementById("churnForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("/predict", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerText = "Prediction: " + result.prediction;
});
</script>

</body>
</html>
